<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- 图标：内外方块 + 压缩箭头 -->
  <rect x="2" y="6" width="36" height="36" rx="4" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="8" y="12" width="24" height="24" rx="3" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- 上下箭头（压缩感） -->
  <polyline points="12,18 20,10 28,18" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="12,30 20,38 28,30" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 文字 -->
  <text x="48" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="#1e293b">Compress</text>
  <text x="135" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="300" fill="#64748b">IO</text>
</svg>